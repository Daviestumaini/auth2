<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <div class="logo-pedestal">
            <img src="https://cdn-icons-png.flaticon.com/512/9431/9431215.png" alt="Icon" class="nav-logo">
        </div>
        <span class="brand-name">Davies' app</span>
    </div>

    <ul class="nav-links">
        <li><a href="login.html">Login</a></li>
        <li><a href="Dashboard.html">Dashboard</a></li>
    </ul>

    <div class="nav-right">
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <button class="search-btn">🔍</button>
        </div>
    </div>
    <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
</nav>

<div class="main-wrapper">
    <div class="stats-grid">
        <div class="stat-card"><h4>Items</h4><span>1</span></div>
        <div class="stat-card"><h4>Items</h4><span>2</span></div>
        <div class="stat-card"><h4>Items</h4><span>3</span></div>
        <div class="stat-card"><h4>Items</h4><span>4</span></div>
    </div>

    <div class="form-container">
        <h2>Create Account</h2>
        <form action="/register" method="POST">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="Eg. Davies" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="last name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="@" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="*************" required>
            </div>
            <button type="submit" class="submit-btn">Sign Up</button>
        </form>

        <div class="footer-links">
            <span>Already have an account? <a href="login.html">Login</a></span>
        </div>
    </div>
</div>

</body>
</html>
